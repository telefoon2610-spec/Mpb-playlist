<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro MP3 Player A/B Loop</title>

<!-- WaveSurfer -->

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 420px;
  background: #151c2e;
  padding: 15px;
  border-radius: 16px;
}

h2 { text-align:center; }

/* waveform */
#waveform {
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
}

/* buttons */
.controls-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.controls-row button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #24304f;
  color: white;
  cursor: pointer;
}

/* loop zone */
#loopZone {
  position: absolute;
  top: 0;
  height: 100%;
  background: rgba(43,111,255,0.3);
  pointer-events: none;
  display: none;
}

.wave-wrap {
  position: relative;
}

/* markers */
.mark {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  font-size: 11px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: grab;
}

#markA { background: green; }
#markB { background: red; }

</style>

</head>

<body>

<div class="box">
  <h2>🎧 Pro MP3 Player</h2>

  <div class="wave-wrap">
    <div id="waveform"></div>
    <div id="loopZone"></div>
    <div id="markA" class="mark" style="display:none;">A</div>
    <div id="markB" class="mark" style="display:none;">B</div>
  </div>

  <div class="controls-row">
    <button onclick="togglePlay()" id="playBtn">Play</button>
    <button onclick="setA()" id="btnA">A -</button>
    <button onclick="setB()" id="btnB">B -</button>
    <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

let current = 0;

let loopA = null;
let loopB = null;
let loopOn = false;

/* WAVESURFER */
const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#4f7cff',
  progressColor: '#2b6fff',
  height: 80
});

/* PLAYLIST */
const list = document.getElementById("list");

tracks.forEach((t,i)=>{
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = ()=> loadTrack(i);
  list.appendChild(div);
});

/* LOAD */
function loadTrack(i){
  current = i;
  wavesurfer.load(tracks[i].file);

  loopA = null;
  loopB = null;
  loopOn = false;

  updateButtons();
}

/* PLAY / PAUSE */
function togglePlay(){
  wavesurfer.playPause();

  document.getElementById("playBtn").innerText =
    wavesurfer.isPlaying() ? "Pause" : "Play";
}

/* FORMAT */
function formatTime(sec){
  if(sec==null) return "-";
  const m = Math.floor(sec/60);
  const s = Math.floor(sec%60);
  return m+":"+s.toString().padStart(2,'0');
}

/* A */
function setA(){
  loopA = wavesurfer.getCurrentTime();
  updateButtons();
  updateVisuals();
}

/* B */
function setB(){
  loopB = wavesurfer.getCurrentTime();
  updateButtons();
  updateVisuals();
}

/* LOOP */
function toggleLoop(){
  if(loopA==null||loopB==null) return;
  loopOn = !loopOn;

  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON":"OFF");
}

/* BUTTON TEXT */
function updateButtons(){
  btnA.innerText = "A " + formatTime(loopA);
  btnB.innerText = "B " + formatTime(loopB);
}

/* VISUALS */
function updateVisuals(){
  const dur = wavesurfer.getDuration();
  if(!dur) return;

  let a = loopA;
  let b = loopB;
  if(a && b && a>b)[a,b]=[b,a];

  const zone = document.getElementById("loopZone");
  const markA = document.getElementById("markA");
  const markB = document.getElementById("markB");

  if(a!=null){
    markA.style.display="block";
    markA.style.left = (a/dur*100)+"%";
  }

  if(b!=null){
    markB.style.display="block";
    markB.style.left = (b/dur*100)+"%";
  }

  if(a!=null && b!=null){
    zone.style.display="block";
    zone.style.left = (a/dur*100)+"%";
    zone.style.width = ((b-a)/dur*100)+"%";
  }
}

/* LOOP CHECK */
wavesurfer.on("audioprocess", ()=>{
  if(loopOn && loopA!=null && loopB!=null){
    let a=loopA, b=loopB;
    if(a>b)[a,b]=[b,a];

    if(wavesurfer.getCurrentTime()>=b){
      wavesurfer.setTime(a);
    }
  }
});

/* LOAD FIRST */
loadTrack(0);
</script>

</body>
</html>
