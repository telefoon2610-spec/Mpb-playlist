<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro MP3 Player</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f19;
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:420px;
  background:#151c2e;
  padding:15px;
  border-radius:16px;
}

h2{text-align:center;}

.wave-wrap{
  position:relative;
  margin-top:10px;
}

/* TIME DISPLAY */
.timebar{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:6px;
  opacity:0.8;
}

#waveform{
  border-radius:10px;
  overflow:hidden;
}

/* LOOP ZONE */
#loopZone{
  position:absolute;
  top:0;
  height:100%;
  background:rgba(43,111,255,0.25);
  display:none;
  pointer-events:none;
}

/* MARKERS */
.marker{
  position:absolute;
  top:0;
  transform:translateX(-50%);
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
  cursor:grab;
  user-select:none;
  z-index:10;
}

#markA{background:#16a34a;}
#markB{background:#dc2626;}

.controls-row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.controls-row button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#24304f;
  color:white;
  cursor:pointer;
}

.speed{
  margin-top:10px;
}

.track{
  padding:10px;
  margin-top:6px;
  background:#1f2a44;
  border-radius:8px;
  cursor:pointer;
}

.track.active{
  background:#2b6fff;
}
</style>

</head>

<body>

<div class="box">
  <h2>🎧 Pro MP3 Player</h2>

  <!-- TIME -->

  <div class="timebar">
    <div id="currentTime">0:00</div>
    <div id="totalTime">0:00</div>
  </div>

  <!-- WAVE -->

  <div class="wave-wrap">
    <div id="waveform"></div>
    <div id="loopZone"></div>

```
<div id="markA" class="marker" style="display:none;">A</div>
<div id="markB" class="marker" style="display:none;">B</div>
```

  </div>

  <div class="controls-row">
    <button onclick="togglePlay()" id="playBtn">Play</button>
    <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  </div>

  <div class="speed">
    Snelheid: <span id="speedVal">100%</span>
    <input type="range" min="50" max="200" value="100" oninput="setSpeed(this.value)">
  </div>

  <div id="list"></div>
</div>

<script>
const tracks=[
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

let current=0;
let loopA=null, loopB=null, loopOn=false;

const wavesurfer=WaveSurfer.create({
  container:"#waveform",
  waveColor:"#4f7cff",
  progressColor:"#2b6fff",
  height:80,
  responsive:true,
  normalize:true
});

/* LOAD */
function loadTrack(i){
  current=i;
  wavesurfer.load(tracks[i].file);

  resetLoop();
  updatePlaylist();
}

/* PLAYLIST */
const list=document.getElementById("list");

tracks.forEach((t,i)=>{
  const div=document.createElement("div");
  div.className="track";
  div.innerText=t.name;
  div.onclick=()=>loadTrack(i);
  list.appendChild(div);
});

function updatePlaylist(){
  document.querySelectorAll(".track").forEach((el,i)=>{
    el.classList.toggle("active",i===current);
  });
}

/* RESET */
function resetLoop(){
  loopA=null;
  loopB=null;
  loopOn=false;

  document.getElementById("loopBtn").innerText="Loop OFF";
  document.getElementById("markA").style.display="none";
  document.getElementById("markB").style.display="none";
  document.getElementById("loopZone").style.display="none";

  updateMarkers();
}

/* PLAY */
function togglePlay(){
  wavesurfer.playPause();
  playBtn.innerText=wavesurfer.isPlaying()?"Pause":"Play";
}

/* LOOP */
function toggleLoop(){
  if(loopA==null||loopB==null)return;
  loopOn=!loopOn;
  loopBtn.innerText="Loop "+(loopOn?"ON":"OFF");
}

/* SPEED */
function setSpeed(v){
  wavesurfer.setPlaybackRate(v/100);
  speedVal.innerText=v+"%";
}

/* TIME FORMAT */
function format(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60);
  return m+":"+s.toString().padStart(2,'0');
}

/* UPDATE TIME */
wavesurfer.on("audioprocess",()=>{
  currentTime.innerText=format(wavesurfer.getCurrentTime());
});

/* READY */
wavesurfer.on("ready",()=>{
  totalTime.innerText=format(wavesurfer.getDuration());
  wavesurfer.play();
  playBtn.innerText="Pause";

  initMarkers();
});

/* LOOP ENGINE */
wavesurfer.on("audioprocess",()=>{
  if(loopOn && loopA!=null && loopB!=null){
    let a=loopA,b=loopB;
    if(a>b)[a,b]=[b,a];

    if(wavesurfer.getCurrentTime()>=b){
      wavesurfer.setTime(a);
    }
  }
});

/* MARKERS */
function initMarkers(){
  const container=document.querySelector("#waveform");

  const makeDraggable=(el,type)=>{
    let dragging=false;

    el.onmousedown=()=>dragging=true;
    document.onmouseup=()=>dragging=false;

    document.onmousemove=(e)=>{
      if(!dragging)return;

      const rect=container.getBoundingClientRect();
      let pct=(e.clientX-rect.left)/rect.width;
      pct=Math.max(0,Math.min(1,pct));

      const time=pct*wavesurfer.getDuration();

      if(type==="A")loopA=time;
      if(type==="B")loopB=time;

      updateMarkers();
    };
  };

  makeDraggable(markA,"A");
  makeDraggable(markB,"B");
}

/* UPDATE MARKERS VISUAL */
function updateMarkers(){
  const dur=wavesurfer.getDuration();
  if(!dur)return;

  let a=loopA,b=loopB;
  if(a&&b&&a>b)[a,b]=[b,a];

  const zone=document.getElementById("loopZone");

  if(a!=null){
    markA.style.display="block";
    markA.style.left=(a/dur*100)+"%";
  }

  if(b!=null){
    markB.style.display="block";
    markB.style.left=(b/dur*100)+"%";
  }

  if(a!=null&&b!=null){
    zone.style.display="block";
    zone.style.left=(a/dur*100)+"%";
    zone.style.width=((b-a)/dur*100)+"%";
  }else{
    zone.style.display="none";
  }
}

/* INIT */
loadTrack(0);
</script>

</body>
</html>
