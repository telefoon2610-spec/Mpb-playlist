<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Player A/B Loop</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 420px;
  background: #151c2e;
  padding: 15px;
  border-radius: 16px;
}

h2 { text-align: center; }

audio {
  width: 100%;
}

/* TRACKS */
.track {
  padding: 12px;
  margin-top: 8px;
  background: #1f2a44;
  border-radius: 10px;
  cursor: pointer;
}

.track.active {
  background: #2b6fff;
}

/* SPEED */
.controls {
  margin-top: 10px;
}

input { width: 100%; }

/* LOOP BUTTONS */
.loop-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.loop-row button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #24304f;
  color: white;
  font-size: 12px;
}

/* PROGRESS */
.progress-wrap {
  margin-top: 10px;
  position: relative;
}

#progress {
  width: 100%;
}

/* DRAGGABLE MARKERS */
.mark {
  position: absolute;
  top: -10px;
  font-size: 10px;
  transform: translateX(-50%);
  background: black;
  padding: 3px 6px;
  border-radius: 4px;
  white-space: nowrap;
  cursor: grab;
  user-select: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎧 MP3 Player A/B Loop</h2>

  <audio id="audio" controls></audio>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <input type="range" id="progress" min="0" max="100" value="0">

    <div id="markA" class="mark" style="display:none;">A</div>
    <div id="markB" class="mark" style="display:none;">B</div>
  </div>

  <!-- SPEED -->
  <div class="controls">
    <label>Snelheid: <span id="speed">100%</span></label>
    <input type="range" min="50" max="200" value="100"
      oninput="setSpeed(this.value)">
  </div>

  <!-- LOOP CONTROLS -->
  <div class="loop-row">
    <button onclick="setA()" id="btnA">A</button>
    <button onclick="setB()" id="btnB">B</button>
    <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

const audio = document.getElementById("audio");
const list = document.getElementById("list");
const progress = document.getElementById("progress");

let current = 0;

// LOOP STATE
let loopOn = false;
let loopA = null;
let loopB = null;

// DRAG STATE
let dragging = null;

/* FORMAT TIME */
function formatTime(sec) {
  if (sec === null || sec === undefined) return "-";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

/* PLAYLIST */
tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = () => play(i);
  list.appendChild(div);
});

/* PLAY TRACK */
function play(i) {
  current = i;
  audio.src = tracks[i].file;

  // 🔄 RESET LOOP
  loopA = null;
  loopB = null;
  loopOn = false;

  document.getElementById("loopBtn").innerText = "Loop OFF";
  document.getElementById("markA").style.display = "none";
  document.getElementById("markB").style.display = "none";

  updateButtons();

  audio.play();
  updateUI();
}

/* UI */
function updateUI() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

/* SPEED */
function setSpeed(val) {
  audio.playbackRate = val / 100;
  document.getElementById("speed").innerText = val + "%";
}

/* A */
function setA() {
  loopA = audio.currentTime;
  updateButtons();
  updateMarks();
}

/* B */
function setB() {
  loopB = audio.currentTime;
  updateButtons();
  updateMarks();
}

/* LOOP ON/OFF */
function toggleLoop() {
  loopOn = !loopOn;
  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON" : "OFF");
}

/* BUTTON TEXT */
function updateButtons() {
  document.getElementById("btnA").innerText =
    "A " + formatTime(loopA);

  document.getElementById("btnB").innerText =
    "B " + formatTime(loopB);
}

/* MARKERS */
function updateMarks() {
  const dur = audio.duration;
  if (!dur) return;

  const markA = document.getElementById("markA");
  const markB = document.getElementById("markB");

  if (loopA !== null) {
    markA.style.display = "block";
    markA.style.left = (loopA / dur * 100) + "%";
    markA.innerText = "A " + formatTime(loopA);
  }

  if (loopB !== null) {
    markB.style.display = "block";
    markB.style.left = (loopB / dur * 100) + "%";
    markB.innerText = "B " + formatTime(loopB);
  }
}

/* DRAG FUNCTION */
function attachDrag(el, type) {
  el.addEventListener("mousedown", () => dragging = type);
}

document.addEventListener("mouseup", () => dragging = null);

document.addEventListener("mousemove", (e) => {
  if (!dragging || !audio.duration) return;

  const rect = progress.getBoundingClientRect();
  let percent = (e.clientX - rect.left) / rect.width;
  percent = Math.max(0, Math.min(1, percent));

  const time = percent * audio.duration;

  if (dragging === "A") loopA = time;
  if (dragging === "B") loopB = time;

  updateButtons();
  updateMarks();
});

/* PROGRESS */
audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
  }

  if (loopOn && loopA !== null && loopB !== null) {
    if (audio.currentTime >= loopB) {
      audio.currentTime = loopA;
      audio.play();
    }
  }
});

/* SEEK */
progress.addEventListener("input", () => {
  if (audio.duration) {
    audio.currentTime = (progress.value / 100) * audio.duration;
  }
});

/* INIT MARKERS */
audio.addEventListener("loadedmetadata", () => {
  updateMarks();

  attachDrag(document.getElementById("markA"), "A");
  attachDrag(document.getElementById("markB"), "B");
});

/* AUTO NEXT */
audio.addEventListener("ended", () => {
  if (loopOn && loopA !== null && loopB !== null) return;

  current = (current + 1) % tracks.length;
  play(current);
});

/* START */
play(0);
</script>

</body>
</html>
