<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Player A/B Loop</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 420px;
  background: #151c2e;
  padding: 15px;
  border-radius: 16px;
}

h2 { text-align: center; }

audio { width: 100%; }

.track {
  padding: 12px;
  margin-top: 8px;
  background: #1f2a44;
  border-radius: 10px;
  cursor: pointer;
}

.track.active { background: #2b6fff; }

.controls { margin-top: 10px; }
input { width: 100%; }

.loop-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.loop-row button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #24304f;
  color: white;
  font-size: 12px;
}

.progress-wrap {
  margin-top: 10px;
  position: relative;
}

/* A-B ZONE */
#loopZone {
  position: absolute;
  top: 50%;
  height: 6px;
  transform: translateY(-50%);
  background: rgba(43,111,255,0.5);
  border-radius: 4px;
  pointer-events: none;
  display: none;
}

.mark {
  position: absolute;
  top: -10px;
  font-size: 10px;
  transform: translateX(-50%);
  background: black;
  padding: 3px 6px;
  border-radius: 4px;
  white-space: nowrap;
  cursor: grab;
  user-select: none;
}
</style>

</head>

<body>

<div class="box">
  <h2>🎧 MP3 Player A/B Loop</h2>

<audio id="audio" controls></audio>

  <div class="progress-wrap">
    <input type="range" id="progress" min="0" max="100" value="0">

```
<div id="loopZone"></div>

<div id="markA" class="mark" style="display:none;">A</div>
<div id="markB" class="mark" style="display:none;">B</div>
```

  </div>

  <div class="controls">
    <label>Snelheid: <span id="speed">100%</span></label>
    <input type="range" min="50" max="200" value="100"
      oninput="setSpeed(this.value)">
  </div>

  <div class="loop-row">
    <button onclick="setA()" id="btnA">A -</button>
    <button onclick="setB()" id="btnB">B -</button>
    <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

const audio = document.getElementById("audio");
const list = document.getElementById("list");
const progress = document.getElementById("progress");

let current = 0;

// LOOP
let loopOn = false;
let loopA = null;
let loopB = null;

// DRAG
let dragging = null;

/* FORMAT */
function formatTime(sec) {
  if (sec === null) return "-";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + s.toString().padStart(2,'0');
}

/* PLAYLIST */
tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = () => play(i);
  list.appendChild(div);
});

/* PLAY */
function play(i) {
  current = i;
  audio.src = tracks[i].file;

  loopA = null;
  loopB = null;
  loopOn = false;

  document.getElementById("loopBtn").innerText = "Loop OFF";
  document.getElementById("markA").style.display = "none";
  document.getElementById("markB").style.display = "none";
  document.getElementById("loopZone").style.display = "none";

  updateButtons();
  updateUI();

  audio.play();
}

/* UI */
function updateUI() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

/* SPEED */
function setSpeed(val) {
  audio.playbackRate = val / 100;
  document.getElementById("speed").innerText = val + "%";
}

/* SET A */
function setA() {
  loopA = audio.currentTime;
  updateButtons();
  updateMarks();
}

/* SET B */
function setB() {
  loopB = audio.currentTime;
  updateButtons();
  updateMarks();
}

/* LOOP TOGGLE */
function toggleLoop() {
  if (loopA === null || loopB === null) return;

  loopOn = !loopOn;

  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON" : "OFF");
}

/* BUTTON TEXT */
function updateButtons() {
  document.getElementById("btnA").innerText =
    "A " + formatTime(loopA);

  document.getElementById("btnB").innerText =
    "B " + formatTime(loopB);
}

/* MARKERS + ZONE */
function updateMarks() {
  const dur = audio.duration;
  if (!dur) return;

  const markA = document.getElementById("markA");
  const markB = document.getElementById("markB");
  const zone = document.getElementById("loopZone");

  let a = loopA;
  let b = loopB;

  if (a !== null && b !== null && a > b) {
    [a, b] = [b, a];
  }

  if (a !== null) {
    markA.style.display = "block";
    markA.style.left = (a / dur * 100) + "%";
    markA.innerText = "A " + formatTime(a);
  }

  if (b !== null) {
    markB.style.display = "block";
    markB.style.left = (b / dur * 100) + "%";
    markB.innerText = "B " + formatTime(b);
  }

  if (a !== null && b !== null) {
    zone.style.display = "block";
    const left = (a / dur) * 100;
    const right = (b / dur) * 100;
    zone.style.left = left + "%";
    zone.style.width = (right - left) + "%";
  } else {
    zone.style.display = "none";
  }
}

/* DRAG */
function attachDrag(el, type) {
  el.addEventListener("mousedown", () => dragging = type);
}

document.addEventListener("mouseup", () => dragging = null);

document.addEventListener("mousemove", (e) => {
  if (!dragging || !audio.duration) return;

  const rect = progress.getBoundingClientRect();
  let percent = (e.clientX - rect.left) / rect.width;
  percent = Math.max(0, Math.min(1, percent));

  const time = percent * audio.duration;

  if (dragging === "A") loopA = time;
  if (dragging === "B") loopB = time;

  updateButtons();
  updateMarks();
});

/* TIME UPDATE */
audio.addEventListener("timeupdate", () => {
  if (audio.duration) {
    progress.value = (audio.currentTime / audio.duration) * 100;
  }

  if (loopOn && loopA !== null && loopB !== null) {
    let a = loopA;
    let b = loopB;

    if (a > b) [a, b] = [b, a];

    if (audio.currentTime >= b) {
      audio.currentTime = a;
    }
  }
});

/* SEEK */
progress.addEventListener("input", () => {
  if (audio.duration) {
    audio.currentTime = (progress.value / 100) * audio.duration;
  }
});

/* INIT */
audio.addEventListener("loadedmetadata", () => {
  updateMarks();

  attachDrag(document.getElementById("markA"), "A");
  attachDrag(document.getElementById("markB"), "B");
});

/* AUTO NEXT */
audio.addEventListener("ended", () => {
  if (loopOn && loopA !== null && loopB !== null) return;

  current = (current + 1) % tracks.length;
  play(current);
});

/* START */
play(0);
</script>

</body>
</html>
